name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            ext: ""
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            ext: ""
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            ext: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: install bun
        uses: oven-sh/setup-bun@v1

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 desktop-file-utils libarchive-tools

      - name: Download Sidecars (Latest Releases)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          
          CLI_URL="https://github.com/DisChord-Org/DischordCLI/releases/latest/download"
          COMPILER_URL="https://github.com/DisChord-Org/DisChord/releases/latest/download"
          
          CLI_FILE="chord-${{ matrix.target }}${{ matrix.ext }}"
          COMPILER_FILE="dischord-compiler-${{ matrix.target }}${{ matrix.ext }}"
          
          echo "Descargando Sidecars para ${{ matrix.target }}..."
          
          curl -L "$CLI_URL/$CLI_FILE" -o "src-tauri/binaries/$CLI_FILE"
          curl -L "$COMPILER_URL/$COMPILER_FILE" -o "src-tauri/binaries/$COMPILER_FILE"
          ls -lh src-tauri/binaries/

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
          OUTPUT_APPIMAGE: "DisChord_Studio.AppImage"
          APPIMAGE_EXTRACT_AND_RUN: "1"
          XDG_CACHE_HOME: /home/runner/.cache
          NO_STRIP: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DisChord Studio ${{ github.ref_name }}"
          releaseBody: "Versión 1.0.0. Incluye IDE, CLI y Compilador."
          releaseDraft: true
          prerelease: false