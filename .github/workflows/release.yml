name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: install bun
        uses: oven-sh/setup-bun@v1

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 desktop-file-utils libarchive-tools

      - name: Clone and Build Sidecars (CLI & Compiler)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          
          RAW_ARCH=$(uname -m)
          if [ "$RAW_ARCH" = "arm64" ] || [ "$RAW_ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          else
            ARCH_NAME="x86_64"
          fi

          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            EXT=".exe"
            TARGET="$ARCH_NAME-pc-windows-msvc"
          elif [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            EXT=""
            TARGET="$ARCH_NAME-unknown-linux-gnu"
          else
            EXT=""
            TARGET="$ARCH_NAME-apple-darwin"
          fi

          git clone https://github.com/DisChord-Org/DischordCLI.git cli-repo
          cd cli-repo && bun install
          bun build ./src/index.ts --compile --outfile ../src-tauri/binaries/dischord-cli-$TARGET$EXT
          cd ..

          git clone https://github.com/DisChord-Org/DisChord.git compiler-repo
          cd compiler-repo && bun install
          bun build ./src/index.ts --compile --outfile ../src-tauri/binaries/dischord-compiler-$TARGET$EXT
          cd ..

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
          OUTPUT_APPIMAGE: "DisChord_Studio.AppImage"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DisChord Studio ${{ github.ref_name }}"
          releaseBody: "Versión 1.0.0. Incluye IDE, CLI y Compilador."
          releaseDraft: true
          prerelease: false