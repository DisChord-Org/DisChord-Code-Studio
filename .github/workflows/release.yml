name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: install bun
        uses: oven-sh/setup-bun@v1

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 desktop-file-utils libarchive-tools wget file squashfs-tools

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Ad-hoc sign (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          # Compilamos primero para generar el bundle
          pnpm tauri build --target aarch64-apple-darwin
          
          # Buscamos el .app y lo firmamos recursivamente (-s - es ad-hoc)
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" | head -n 1)
          if [ -d "$APP_PATH" ]; then
            echo "Firmando ad-hoc: $APP_PATH"
            codesign --force --deep -s - "$APP_PATH"
          else
            echo "No se encontró el .app para firmar"
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: "--max_old_space_size=4096"
          XDG_CACHE_HOME: /home/runner/.cache
          NO_STRIP: "1"
        with:
          tagName: v__VERSION__
          releaseName: "DisChord IDE v__VERSION__"
          releaseBody: "Actualización automática desde GitHub Actions."
          releaseDraft: false
          prerelease: false